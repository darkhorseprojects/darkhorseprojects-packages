packages:
  openai-responses: openai-responses

models:
  default: local-llama

  local-llama:
    adapter: openai-responses.adapter
    params:
      provider: llama.cpp
      endpoint: http://127.0.0.1:30000
      endpoint_kind: chat_completions
      model: local-gemma-4-e4b-it
      temperature: 0.2
      max_output_tokens: 512
      context_window: 16384
      reasoning:
        effort: medium
        max_tokens: 512
