name: openai-responses
version: "0.1.7"
about: OpenAI Responses-shaped model adapter package.

source:
  git: https://github.com/darkhorseprojects/darkhorseprojects-packages.git
  ref: main
  path: openai-responses

assets:
  short-answer: shapes/short-answer.circuitry.yaml
  responses: adapters/responses.py
  runtime-prompt: prompts/runtime.md
  default-config: config/zinc.models.yaml
  readme: docs/README.md
  icon: assets/icon.svg

scripts:
  setup:
    linux: scripts/setup
    macos: scripts/setup
  check:
    linux: scripts/check
    macos: scripts/check
  remove:
    linux: scripts/remove
    macos: scripts/remove
