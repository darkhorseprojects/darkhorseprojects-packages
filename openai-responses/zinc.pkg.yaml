name: openai-responses
version: "0.1.5"
about: OpenAI Responses-shaped model adapter package.

source:
  git: https://github.com/darkhorseprojects/darkhorseprojects-packages.git
  ref: main
  path: openai-responses

assets:
  short-answer:
    path: shapes/short-answer.circuitry.yaml
    does: circuitry.shape

  responses:
    path: adapters/responses.py
    does:
      - zinc.adapter
      - openai.responses

  runtime-prompt:
    path: prompts/runtime.md
    does: prompt

  default-config:
    path: config/zinc.models.yaml
    does: config

  readme:
    path: docs/README.md
    does: doc

  icon:
    path: assets/icon.svg
    does: image

scripts:
  setup:
    linux: scripts/setup
    macos: scripts/setup
  check:
    linux: scripts/check
    macos: scripts/check
  remove:
    linux: scripts/remove
    macos: scripts/remove
